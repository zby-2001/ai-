<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 冰箱食材助手</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">今晚吃什么</p>
      <h1>AI 冰箱食材助手</h1>
      <p class="intro">输入家里现有食材和口味偏好，快速得到 3 个能马上做的菜谱方案。</p>
    </section>

    <section class="tool-panel" aria-label="菜谱生成表单">
      <label for="ingredients">已有食材</label>
      <textarea id="ingredients" rows="4" placeholder="例如：鸡蛋、番茄、米饭、青菜"></textarea>

      <label for="preferences">做饭偏好</label>
      <input id="preferences" type="text" placeholder="例如：快手、少油、不辣">

      <div class="form-grid">
        <div>
          <label for="servings">人数</label>
          <select id="servings">
            <option value="1 人">1 人</option>
            <option value="2 人" selected>2 人</option>
            <option value="3-4 人">3-4 人</option>
          </select>
        </div>

        <div>
          <label for="maxTime">烹饪时间</label>
          <select id="maxTime">
            <option value="10 分钟内">10 分钟内</option>
            <option value="20 分钟内" selected>20 分钟内</option>
            <option value="30 分钟内">30 分钟内</option>
          </select>
        </div>
      </div>

      <label for="avoidances">忌口</label>
      <input id="avoidances" type="text" placeholder="例如：不吃香菜、不要海鲜">

      <p id="formMessage" class="form-message" aria-live="polite"></p>
      <button id="generateBtn" type="button">生成 3 个菜谱</button>
    </section>

    <section class="results-section" aria-label="菜谱结果">
      <div id="statusBox" class="status-box">先输入食材，然后点击生成。</div>
      <div class="result-actions">
        <button id="toggleDebugBtn" class="secondary-button" type="button" hidden>显示调试信息</button>
        <button id="retryBtn" class="secondary-button" type="button" hidden>重试一次</button>
        <button id="regenerateBtn" class="secondary-button" type="button" hidden>重新生成当前条件</button>
      </div>
      <section id="debugPanel" class="debug-panel" aria-label="Prompt 调试信息" hidden></section>
      <div id="recipeGrid" class="recipe-grid"></div>
      <article id="recipeDetail" class="recipe-detail" hidden></article>
    </section>

    <section class="history-section" aria-label="最近生成记录">
      <div class="section-header">
        <h2>最近生成</h2>
        <button id="clearHistoryBtn" class="secondary-button" type="button">清空</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>

    <section class="favorites-section" aria-label="收藏菜谱">
      <div class="section-header">
        <h2>收藏菜谱</h2>
        <button id="clearFavoritesBtn" class="secondary-button" type="button">清空</button>
      </div>
      <div id="favoritesList" class="history-list"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
